<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mehtamon</title>

<style>
  :root{
    --bg0:#070A12;
    --bg1:#0b1020;
    --panel: rgba(255,255,255,0.08);
    --panel2: rgba(255,255,255,0.12);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.70);
    --ring: rgba(255,255,255,0.18);
    --shadow: 0 18px 60px rgba(0,0,0,0.45);
    --good:#3ddc97;
    --warn:#ffd166;
    --bad:#ff4d6d;
  }
  *{ box-sizing:border-box; }
  html, body { height:100%; margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background: #000; color: var(--text); }
  #app { height:100%; display:flex; align-items:center; justify-content:center; padding: 18px; background: radial-gradient(1200px 700px at 50% 10%, #121a35, #070A12 60%, #000 100%); }

  /* ===== YOUR INTRO STYLES (UNCHANGED LOOK) ===== */
  #intro { text-align:center; }
  .intro-text {
    font-weight: 800;
    letter-spacing: 3px;
    color: transparent;
    -webkit-text-stroke: 2px #ffffff;
    opacity: 0;
    transition: opacity 0.08s linear, color 0.15s ease, -webkit-text-stroke 0.15s ease;
    user-select:none;
  }
  .title { font-size: clamp(32px, 6vw, 72px); }
  .subtitle {
    margin-top: 10px;
    font-size: clamp(14px, 2vw, 22px);
    letter-spacing: 4px;
    -webkit-text-stroke: 1.5px #ffffff;
  }
  .lit {
    opacity: 1;
    color: white;
    -webkit-text-stroke: 0px transparent;
    text-shadow: 0 0 18px rgba(255,255,255,0.9);
  }
  .final {
    opacity: 1;
    color: #ff2b2b;
    -webkit-text-stroke: 0px transparent;
    text-shadow: 0 0 22px rgba(255,50,50,0.95);
  }

  /* ===== GENERAL UI ===== */
  .screen { width:min(1100px, 100%); }
  .card {
    background: var(--panel);
    border: 1px solid var(--ring);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  .cardHeader{
    padding: 16px 16px 10px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  }
  .h1{ font-size: clamp(28px, 4vw, 44px); font-weight: 900; letter-spacing: 1px; }
  .sub{ color: var(--muted); font-size: 14px; }
  .cardBody{ padding: 16px; }
  .row{ display:flex; gap:14px; flex-wrap:wrap; }
  .col{ flex: 1 1 320px; min-width: 280px; }
  .btn{
    appearance:none; border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.08);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 12px;
    cursor:pointer;
    font-weight: 800;
    letter-spacing:.5px;
    transition: transform .08s ease, background .15s ease, border-color .15s ease;
    user-select:none;
  }
  .btn:hover{ background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.26); }
  .btn:active{ transform: translateY(1px) scale(0.99); }
  .btnPrimary{
    background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.08));
    border-color: rgba(255,255,255,0.28);
  }
  .btnGood{ background: rgba(61,220,151,0.18); border-color: rgba(61,220,151,0.34); }
  .btnWarn{ background: rgba(255,209,102,0.18); border-color: rgba(255,209,102,0.34); }
  .btnBad{ background: rgba(255,77,109,0.18); border-color: rgba(255,77,109,0.34); }
  .pill{
    display:inline-flex; align-items:center; gap:8px;
    padding: 6px 10px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(0,0,0,0.22);
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    letter-spacing:.4px;
    user-select:none;
  }
  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .mini{
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.22);
    padding: 12px;
  }
  .nameRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .nm{ font-weight: 900; letter-spacing:.4px; }
  .rar{ font-size: 11px; font-weight: 900; letter-spacing:.8px; opacity:.9; }
  .statline{ margin-top: 10px; display:grid; grid-template-columns: 1fr 1fr; gap: 8px; color: var(--muted); font-size: 12px; }
  .barWrap{ margin-top: 10px; }
  .barLabel{ display:flex; justify-content:space-between; font-size: 12px; color: var(--muted); }
  .bar{
    height: 10px; border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.10);
    overflow:hidden;
    margin-top: 6px;
  }
  .bar > div{ height:100%; width:50%; background: rgba(255,255,255,0.25); }
  .log{
    height: 180px;
    overflow:auto;
    padding: 10px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(0,0,0,0.22);
    color: rgba(255,255,255,0.86);
    font-size: 13px;
    line-height: 1.35;
  }
  .muted{ color: var(--muted); }
  .topRight{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end;
  }
  .modalBack{
    position:fixed; inset:0; background: rgba(0,0,0,0.62);
    display:none; align-items:center; justify-content:center;
    padding: 18px; z-index: 50;
  }
  .modalBack.show{ display:flex; }
  .modal{
    width: min(980px, 100%);
    max-height: min(86vh, 780px);
    overflow:auto;
  }
  .fadeIn{ animation: fadeIn .25s ease both; }
  @keyframes fadeIn { from{opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }
  .fadeOut{ animation: fadeOut .25s ease both; }
  @keyframes fadeOut { from{opacity:1;} to{opacity:0;} }
</style>
</head>

<body>
<div id="app"></div>

<!-- Collection Modal -->
<div id="modalBack" class="modalBack" role="dialog" aria-modal="true">
  <div class="card modal fadeIn">
    <div class="cardHeader">
      <div>
        <div class="h1" style="font-size:24px;">My Mehtamon</div>
        <div class="sub" id="collectionSub"></div>
      </div>
      <div class="topRight">
        <button class="btn" id="closeModalBtn">Close</button>
      </div>
    </div>
    <div class="cardBody">
      <div id="collectionGrid" class="grid"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   MEHTAMON — Single-file vibe-coded game
   Flow: Intro -> Title -> Starter Select -> Battle -> Unlock -> Repeat
   Starter must be COMMON.
========================================================= */

/* ======== DATA: Shared move pool ======== */
const SHARED_MOVES = [

/* ======== DATA: 50 Mehtamon (rarities finalized) ========

const MEHTAMON = [

  mk("Scottie Barnstorm","Common",108,70, 56, 64, 64, "Versatile Surge", ["Bullet Pass","Quick Drive","Lockdown Stance"]),
  mk("Cade Cunningjam","Common",106,70, 54, 66, 68, "Calculated Attack", ["Court Vision","Deep Shot","Quick Drive"]),
  mk("Khris Middletony","Common",104,68, 52, 68, 66, "Silent Clutch", ["Clutch Focus","Stepback","Deep Shot"]),
  mk("Ben Simmon’t","Common",  108,74, 58, 60, 62, "Phantom Transition", ["Fast Break","Bullet Pass","Lockdown Stance"]),

  // RARE (15)
  mk("Darius Garlandish","Rare",104,78, 64, 66, 70, "Flash Handle", ["Ankle Shift","Deep Shot","Fast Break"]),
  mk("Evan Mobleytron","Rare",  118,68, 54, 66, 68, "Tower Block", ["Lockdown Stance","Power Finish","Court Vision"]),
  mk("Pascal Si-yak","Rare",    112,70, 58, 68, 64, "Spin Cycle", ["Quick Drive","Stepback","Fast Break"]),
  mk("De’Aaron Foxxie","Rare",  106,78, 72, 64, 60, "Turbo Burst", ["Fast Break","Quick Drive","Ankle Shift"]),
  mk("Tyrese Haliburner","Rare",104,80, 62, 62, 78, "Laser Assist", ["Bullet Pass","Court Vision","Deep Shot"]),
  mk("Paul Geezer","Rare",      108,70, 56, 64, 76, "Veteran Read", ["Court Vision","Lockdown Stance","Quick Drive"]),
  mk("Jamal Murr-ray","Rare",   106,72, 60, 70, 66, "Playoff Mode", ["Deep Shot","Stepback","Clutch Focus"]),
  mk("Karl-Anthony Towel","Rare",116,66, 52, 74, 64, "Stretch Big", ["Deep Shot","Power Finish","Lockdown Stance"]),
  mk("Rudy Goobert","Rare",      124,62, 44, 62, 64, "No-Fly Zone", ["Lockdown Stance","Power Finish","Court Vision"]),
  mk("Chris Pailed","Rare",      104,84, 58, 62, 82, "Point God", ["Bullet Pass","Court Vision","Stepback"]),
  mk("LaMelo Bawls","Rare",      104,78, 66, 64, 72, "Showtime Feed", ["Bullet Pass","Fast Break","Deep Shot"]),
  mk("Paolo Bankroll","Rare",    114,70, 56, 72, 62, "Rising Star", ["Power Finish","Quick Drive","Clutch Focus"]),
  mk("Draymond Gremlin","Rare",  112,70, 54, 62, 74, "Mind Games", ["Lockdown Stance","Court Vision","Bullet Pass"]),
  mk("Klay Thompsonic","Rare",   106,70, 58, 76, 60, "Flamethrower", ["Deep Shot","Stepback","Quick Drive"]),
  mk("Russell Westbrick","Rare", 112,74, 66, 66, 56, "All Gas", ["Fast Break","Power Finish","Quick Drive"]),

  // ELITE (10)
  mk("Trae Youngling","Elite",    102,78, 70, 70, 72, "Logo Bomb", ["Deep Shot","Stepback","Ankle Shift"]),
  mk("Monovan Ditchell","Elite",  110,74, 68, 74, 62, "Explosive Takeoff", ["Quick Drive","Power Finish","Fast Break"]),
  mk("Jaylen Brownie","Elite",    112,70, 62, 74, 58, "Force Drive", ["Power Finish","Lockdown Stance","Fast Break"]),
  mk("Jayson Tatumbo","Elite",    112,70, 60, 76, 66, "Iso King", ["Stepback","Deep Shot","Clutch Focus"]),
  mk("Jimmy Bucketsen","Elite",   114,70, 58, 74, 70, "Willpower", ["Clutch Focus","Power Finish","Lockdown Stance"]),

  mk("Damian Lollard","Elite",    108,76, 66, 78, 68, "Time’s Up", ["Deep Shot","Stepback","Clutch Focus"]),
  mk("Ja Morantula","Elite",      108,74, 72, 72, 60, "Sky Breaker", ["Fast Break","Quick Drive","Stepback"]),
  mk("Anthony Dateday","Elite",   122,66, 52, 74, 62, "Glass Cleaner", ["Power Finish","Lockdown Stance","Fast Break"]),

  // LEGENDARY (10) — not selectable as starter
  mk("Nikola Joke-ic","Legendary", 124,78, 52, 76, 90, "Basketball IQ", ["Court Vision","Bullet Pass","Power Finish"]),
  mk("Jebron Lames","Legendary",    130,74, 66, 80, 78, "Chosen One", ["Power Finish","Fast Break","Clutch Focus"]),
  mk("Step Flurry","Legendary",     112,80, 72, 82, 74, "Heat Check", ["Deep Shot","Stepback","Court Vision"]),
  mk("Giannis Antetopoopo","Legendary",134,72, 70, 82, 64, "Euro Rampage", ["Fast Break","Power Finish","Lockdown Stance"]),
  mk("Luka Donchick","Legendary",   122,78, 56, 82, 86, "Slow Game", ["Stepback","Court Vision","Deep Shot"]),
  mk("Keven Duran’t","Legendary",   120,76, 62, 86, 78, "Unblockable", ["Deep Shot","Stepback","Clutch Focus"]),
  mk("Victor Wembanyamama","Legendary",140,70, 62, 80, 76, "Alien Reach", ["Lockdown Stance","Deep Shot","Power Finish"]),
  mk("Kyrie Irking","Legendary",    114,78, 76, 82, 74, "Infinite Handles", ["Ankle Shift","Stepback","Quick Drive"]),
  mk("Kawhi Leonardy","Legendary",  126,70, 58, 80, 78, "The Clamp", ["Lockdown Stance","Stepback","Quick Drive"]),
  mk("SGAlexander","Legendary",     116,78, 70, 78, 80, "Silky Control", ["Ankle Shift","Stepback","Deep Shot"]),
];

// helper constructor
function mk(name, rarity, hp, en, spd, skl, iq, sig, moves){
  return {
    id: name,
    name,
    rarity,
    base: { hp, en, spd, skl, iq },
    signature: sig,
    moves: [sig, ...moves], // 4 total, signature first
  };
}

/* ======== GAME STATE ======== */
const app = document.getElementById("app");
const modalBack = document.getElementById("modalBack");
const collectionGrid = document.getElementById("collectionGrid");
const collectionSub = document.getElementById("collectionSub");
document.getElementById("closeModalBtn").onclick = () => toggleCollection(false);

let state = {
  screen: "intro",
  unlocked: new Set(),  // unlocked mehtamon names
  starter: null,        // player chosen base mehtamon
    active: null,
  party: [],            // unlocked order
  player: null,         // current fighter instance
  enemy: null,          // current enemy instance
  turn: "player",
  enemyNextMoveHint: null,
  log: [],
  seenIntro: false,
};

// Start with intro
startIntro();

/* =========================================================
   INTRO (uses your animation behavior)
========================================================= */
function startIntro(){
  state.screen = "intro";
  app.innerHTML = `
    <div id="intro" class="fadeIn">
      <div class="intro-text title">MEHTAVERSE GAMING</div>
      <div class="intro-text subtitle">PRESENTS</div>
    </div>
  `;
  // Your intro logic (ported to SPA), same visual behavior
  const intro = document.querySelectorAll(".intro-text");
  let flashes = 0;

  function flashCycle() {
    if (flashes >= 5) {
      intro.forEach(el => { el.classList.remove("lit"); el.classList.add("final"); });
      setTimeout(() => startTitleScreen(), 800);
      return;
    }
    intro.forEach(el => { el.style.opacity = "1"; el.classList.add("lit"); });
    setTimeout(() => {
      intro.forEach(el => { el.classList.remove("lit"); el.style.opacity = "0"; });
      flashes++;
      setTimeout(flashCycle, 70);
    }, 90);
  }
  setTimeout(flashCycle, 200);
}

/* =========================================================
   TITLE SCREEN
========================================================= */
function startTitleScreen(){
  state.screen = "title";
  app.innerHTML = `
    <div class="screen fadeIn">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h1">MEHTAMON</div>
            <div class="sub">Pro Monster League • Intro → Title → Journey</div>
          </div>
          <div class="topRight">
            <span class="pill">50 Mehtamon</span>
            <span class="pill">Turn-Based Battles</span>
            <span class="pill">Unlock on Win</span>
          </div>
        </div>
        <div class="cardBody">
          <div class="row">
            <div class="col">
              <div class="mini">
                <div class="nm">How it works</div>
                <div class="muted" style="margin-top:8px;">
                  • Choose a <b>Common</b> starter<br>
                  • Battle 1v1<br>
                  • Win once → unlock that enemy Mehtamon<br>
                  • Build your collection with <b>My Mehtamon</b>
                </div>
                <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
  <button class="btn btnPrimary" id="startBtn">
    ${state.active ? "START" : "START"}
  </button>

  <button class="btn" id="viewRosterBtn">Preview Roster</button>

  ${state.active ? `
    <span class="pill">
      Active: <b>${escapeHtml(state.active)}</b>
    </span>
  ` : ""}
</div>

              </div>
            </div>
            <div class="col">
              <div class="mini">
                <div class="nm">Rarity rules</div>
                <div class="muted" style="margin-top:8px;">
                  Starters must be <b>Common</b>. Legendaries are earned, not picked.<br><br>
                  <span class="pill">Common</span>
                  <span class="pill">Rare</span>
                  <span class="pill">Elite</span>
                  <span class="pill">Legendary</span>
                </div>
                <div style="margin-top:14px" class="muted">
                  Tip: Your starter can stay useful with good move choices and energy management.
                </div>
              </div>
            </div>
          </div>
          <div class="muted" style="margin-top:12px; font-size:12px;">
            Vibe-coding friendly: all Mehtamon are data objects; add more by appending to the list.
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("startBtn").onclick = () => {
  if (state.active) {
    startBattleWithRandomEnemy(); // keep current active Mehtamon
  } else {
    startStarterSelect(); // first-time only
  }
};

  document.getElementById("viewRosterBtn").onclick = () => toggleCollection(true, true);
}

/* =========================================================
   STARTER SELECT (Common only)
========================================================= */
function startStarterSelect(){
  state.screen = "starterSelect";
  // Pick 5 commons as starter choices
  const commons = MEHTAMON.filter(m => m.rarity === "Common");
  const starters = pickDistinct(commons, 5);

  app.innerHTML = `
    <div class="screen fadeIn">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h1" style="font-size:30px;">Choose Your Starter</div>
            <div class="sub">Starter must be <b>Common</b>. Pick one Mehtamon to begin your journey.</div>
          </div>
          <div class="topRight">
            <button class="btn" onclick="startTitleScreen()">Back</button>
          </div>
        </div>
        <div class="cardBody">
          <div class="grid" id="starterGrid"></div>
        </div>
      </div>
    </div>
  `;

  const grid = document.getElementById("starterGrid");
  starters.forEach(m => {
    const card = document.createElement("div");
    card.className = "mini";
    card.innerHTML = `
      <div class="nameRow">
        <div class="nm">${escapeHtml(m.name)}</div>
        <div class="rar">${m.rarity.toUpperCase()}</div>
      </div>
      ${statsHTML(m.base)}
      <div class="muted" style="margin-top:10px; font-size:12px;">
        <b>Signature:</b> ${escapeHtml(m.signature)}<br>
        <b>Other:</b> ${escapeHtml(m.moves.slice(1).join(", "))}
      </div>
      <div style="margin-top:12px;">
        <button class="btn btnGood" data-pick="${escapeAttr(m.name)}">Choose</button>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll("[data-pick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const name = btn.getAttribute("data-pick");
      const chosen = MEHTAMON.find(x => x.name === name);
      beginJourney(chosen);
    });
  });
}

function beginJourney(starter){
  state.starter = starter.name;
  state.active = starter.name; // 👈 SET ACTIVE HERE
  unlockMehtamon(starter.name);
  startBattleWithRandomEnemy();
}


/* =========================================================
   BATTLE
========================================================= */
function startBattleWithRandomEnemy(){
  state.screen = "battle";
  state.enemyNextMoveHint = null;
  state.log = [];
  state.turn = "player";

  // Player uses starter or any unlocked? (keep simple: always use starter)
  const playerBase = MEHTAMON.find(m => m.name === state.active);

  state.player = spawnFighter(playerBase);

  // Enemy: choose an un-unlocked mehtamon (or any if all unlocked)
  const pool = MEHTAMON.filter(m => !state.unlocked.has(m.name));
  const enemyBase = (pool.length ? randPick(pool) : randPick(MEHTAMON));
  state.enemy = spawnFighter(enemyBase);

  pushLog(`A wild <b>${escapeHtml(state.enemy.name)}</b> appeared! (${state.enemy.rarity})`);
  renderBattle();
}

function spawnFighter(base){
  return {
    name: base.name,
    rarity: base.rarity,
    maxHp: base.base.hp,
    hp: base.base.hp,
    maxEn: base.base.en,
    en: base.base.en,
    spd: base.base.spd,
    skl: base.base.skl,
    iq: base.base.iq,
    signature: base.signature,
    moveList: base.moves.slice(),
    buffs: { def:0, spd:0, atk:0 },
    flags: { dodge:false, clamp:false, noFly:false },
  };
}

function renderBattle(){
  app.innerHTML = `
    <div class="screen fadeIn">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h1" style="font-size:30px;">Battle</div>
            <div class="sub">Win once → unlock the enemy • Starter is <b>${escapeHtml(state.starter)}</b></div>
          </div>
          <div class="topRight">
            <button class="btn" id="collectionBtn">My Mehtamon</button>
            <button class="btn" id="newEnemyBtn">New Enemy</button>
          </div>
        </div>

        <div class="cardBody">

  `;

  document.getElementById("collectionBtn").onclick = () => toggleCollection(true);
  document.getElementById("newEnemyBtn").onclick = () => startBattleWithRandomEnemy();

  // Render move buttons
  const moveBtns = document.getElementById("moveBtns");

function fighterPanelHTML(label, f, hideMoves=false){
  const hpPct = Math.max(0, Math.min(100, (f.hp / f.maxHp) * 100));
  const enPct = Math.max(0, Math.min(100, (f.en / f.maxEn) * 100));
  return `
    <div class="mini">
      <div class="nameRow">
        <div class="nm">${label}: ${escapeHtml(f.name)}</div>
        <div class="rar">${escapeHtml(f.rarity).toUpperCase()}</div>
      </div>

      <div class="barWrap">
        <div class="barLabel"><span>HP</span><span>${Math.max(0,Math.round(f.hp))} / ${f.maxHp}</span></div>
        <div class="bar"><div style="width:${hpPct}%"></div></div>
      </div>

      <div class="barWrap">
        <div class="barLabel"><span>Energy</span><span>${Math.max(0,Math.round(f.en))} / ${f.maxEn}</span></div>
        <div class="bar"><div style="width:${enPct}%"></div></div>
      </div>

      <div class="statline">
        <div>Speed: <b>${f.spd + f.buffs.spd}</b></div>
        <div>Skill: <b>${f.skl}</b></div>
        <div>IQ: <b>${f.iq}</b></div>
        <div>Defense: <b>${Math.max(0, f.buffs.def)}</b></div>
      </div>

      ${hideMoves ? "" : `
        <div class="muted" style="margin-top:10px; font-size:12px;">
          <b>Signature:</b> ${escapeHtml(f.signature)}
        </div>
      `}
    </div>
  `;
}

function playerMove(moveName){
  if (state.turn !== "player") return;

  // Determine order by speed (simple)
  const playerSpeed = state.player.spd + state.player.buffs.spd;
  const enemySpeed  = state.enemy.spd + state.enemy.buffs.spd;

  const playerFirst = playerSpeed >= enemySpeed;

  // execute turn
  state.turn = "busy";
  if (playerFirst){
    doMove(state.player, state.enemy, moveName, true);
    if (checkBattleEnd()) return;
    setTimeout(() => {
      enemyAct();
    }, 350);
  } else {
    // enemy goes first
    enemyAct(() => {
      if (checkBattleEnd()) return;
      setTimeout(() => {
        doMove(state.player, state.enemy, moveName, true);
        if (checkBattleEnd()) return;
        state.turn = "player";
        renderBattle();
      }, 350);
    });
    return;
  }

  // after player move, enemy act is called, then back to player in enemyAct
}

function enemyAct(cb){
  const mv = chooseEnemyMove();
  doMove(state.enemy, state.player, mv, false);
  if (checkBattleEnd()) return;
  state.turn = "player";
  renderBattle();
  if (cb) cb();
}

function chooseEnemyMove(){
  // simple AI: if low energy, try Bullet Pass; if low HP, try Clutch Focus; else random
  const e = state.enemy;
  if (e.en < 10 && e.moveList.includes("Bullet Pass")) return "Bullet Pass";
  if ((e.hp / e.maxHp) < 0.4 && e.moveList.includes("Clutch Focus")) return "Clutch Focus";
  // if player used Court Vision earlier, we may have hinted already
  return randPick(e.moveList);
}

/* =========================================================
   MOVE ENGINE (simple + fun)
========================================================= */
function doMove(attacker, defender, moveName, isPlayer){
  const actor = isPlayer ? "You" : "Enemy";
  const other = isPlayer ? "Enemy" : "You";

  // Stepback dodge flag lasts one incoming attack only
  if (defender.flags.dodge && isAttackMove(moveName) ){
    pushLog(`${actor} used <b>${escapeHtml(moveName)}</b>, but ${other} dodged!`);
    defender.flags.dodge = false;
    // still spend energy cost if any
    spendEnergy(attacker, moveName);
    renderBattle();
    return;
  }

  // special clamps/no-fly flags (very simple)
  if (defender.flags.noFly){
    pushLog(`${actor} tried to act, but ${other}'s defense stopped the play!`);
    defender.flags.noFly = false;
    renderBattle();
    return;
  }

  // spend energy if possible, otherwise weak default
  const ok = spendEnergy(attacker, moveName);
  if (!ok){
    pushLog(`${actor} is out of energy and used a tired poke!`);
    applyDamage(attacker, defender, 6, "Tired Poke");
    renderBattle();
    return;
  }

  // signature vs shared handling
  const isSig = (moveName === attacker.signature);
  const shared = SHARED_MOVES.find(m => m.id === moveName);

  // Accuracy rules
  const accRoll = Math.random();
  let accuracy = 0.92;
  if (moveName === "Deep Shot") accuracy = 0.72;
  if (moveName === "Logo Bomb") accuracy = 0.60;
  if (moveName === "Midrange Master") accuracy = 1.0; // cannot miss
  if (moveName === "Perfect Release") accuracy = 1.0; // cannot miss

  if (isAttackMove(moveName) && accRoll > accuracy){
    pushLog(`${actor} used <b>${escapeHtml(moveName)}</b> and missed!`);
    renderBattle();
    return;
  }

  // Apply effects
  if (moveName === "Bullet Pass"){
    attacker.en = Math.min(attacker.maxEn, attacker.en + 18);
    pushLog(`${actor} used <b>Bullet Pass</b> and regained energy.`);
    renderBattle();
    return;
  }
  if (moveName === "Court Vision"){
    // reveal enemy next move (if player uses it)
    if (isPlayer){
      state.enemyNextMoveHint = chooseEnemyMove();
      pushLog(`You used <b>Court Vision</b>. You can read the enemy's next play.`);
    } else {
      pushLog(`Enemy used <b>Court Vision</b>... they're reading you.`);
    }
    renderBattle();
    return;
  }
  if (moveName === "Lockdown Stance"){
    attacker.buffs.def += 8;
    pushLog(`${actor} used <b>Lockdown Stance</b>. Defense up.`);
    renderBattle();
    return;
  }
  if (moveName === "Fast Break"){
    attacker.buffs.spd += 10;
    pushLog(`${actor} used <b>Fast Break</b>. Speed up.`);
    renderBattle();
    return;
  }
  if (moveName === "Stepback"){
    attacker.flags.dodge = true;
    pushLog(`${actor} used <b>Stepback</b>. Dodge chance is ready.`);
    renderBattle();
    return;
  }
  if (moveName === "Clutch Focus"){
    attacker.buffs.atk += 10;
    pushLog(`${actor} used <b>Clutch Focus</b>. Attack power up.`);
    renderBattle();
    return;
  }
  if (moveName === "Ankle Shift"){
    const dmg = calcDamage(attacker, defender, 12 + Math.random()*8);
    applyDamage(attacker, defender, dmg, moveName);
    if (Math.random() < 0.45){
      defender.buffs.spd = Math.max(-20, defender.buffs.spd - 8);
      pushLog(`${other}'s speed dropped!`);
    }
    renderBattle();
    return;
  }

  // Signature specials (unique names, simple unique effects)
  if (isSig){
    doSignature(attacker, defender, moveName, actor, other);
    renderBattle();
    return;
  }

  // Shared attack moves
  if (shared && shared.type === "atk"){
    const dmg = calcDamage(attacker, defender, shared.base);
    applyDamage(attacker, defender, dmg, moveName);
    renderBattle();
    return;
  }

  // fallback
  pushLog(`${actor} used <b>${escapeHtml(moveName)}</b>.`);
  renderBattle();
}

function isAttackMove(moveName){
  if (SHARED_MOVES.some(m => m.id === moveName && m.type === "atk")) return true;
  // Signatures that are primarily attacks:
  const attackish = new Set([
    "Perfect Release","Two-Way Clamp","Muscle Shot","Midrange Master","Bully Ball",
    "Calculated Attack","Stretch Big","Flamethrower","All Gas","Logo Bomb","Explosive Takeoff",
    "Force Drive","Iso King","Unstoppable Post","Time’s Up","Sky Breaker","Glass Cleaner","Earthshaker",
    "Heat Check","Euro Rampage","Slow Game","Unblockable","Alien Reach","Infinite Handles"
  ]);
  return attackish.has(moveName) || moveName.includes("Encore");
}

function spendEnergy(f, moveName){
  // signature costs: slightly higher
  let cost = 12;
  const shared = SHARED_MOVES.find(m => m.id === moveName);
  if (shared) cost = shared.cost;
  else if (moveName === f.signature) cost = 16;

  if (f.en < cost) return false;
  f.en -= cost;
  return true;
}

function calcDamage(attacker, defender, base){
  const atkBoost = attacker.buffs.atk;
  const defBoost = defender.buffs.def;
  const skillFactor = attacker.skl * 0.08;
  const iqFactor = attacker.iq * 0.04;
  const raw = base + skillFactor + iqFactor + atkBoost;
  const reduced = raw * (1 - Math.min(0.55, Math.max(0, defBoost) / 80));
  // tiny randomness
  return Math.max(4, reduced * (0.92 + Math.random()*0.18));
}

function applyDamage(attacker, defender, amount, label){
  defender.hp = defender.hp - amount;
  pushLog(`${attacker === state.player ? "You" : "Enemy"} used <b>${escapeHtml(label)}</b> → ${Math.round(amount)} dmg.`);
  if (defender.hp < 0) defender.hp = 0;
}

/* =========================================================
   WIN/LOSE + UNLOCKS
========================================================= */
function checkBattleEnd(){
  if (state.enemy.hp <= 0){
    pushLog(`✅ You defeated <b>${escapeHtml(state.enemy.name)}</b>!`);
    unlockMehtamon(state.enemy.name);
    setTimeout(() => showVictory(), 450);
    return true;
  }
  if (state.player.hp <= 0){
    pushLog(`❌ You were defeated. Train and try again!`);
    setTimeout(() => showDefeat(), 450);
    return true;
  }
  return false;
}

function showVictory(){
  app.innerHTML = `
    <div class="screen fadeIn">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h1" style="font-size:30px;">Victory!</div>
            <div class="sub">Unlocked: <b>${escapeHtml(state.enemy.name)}</b></div>
          </div>
          <div class="topRight">
            <button class="btn" onclick="toggleCollection(true)">My Mehtamon</button>
          </div>
        </div>
        <div class="cardBody">
          <div class="mini">
            <div class="nm">New Unlock Added</div>
            <div class="muted" style="margin-top:8px;">
              Your collection grows. Keep winning to catch them all.
            </div>
            <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
              <button class="btn btnPrimary" id="nextFightBtn">Next Battle</button>
              <button class="btn" id="backTitleBtn">Title Screen</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("nextFightBtn").onclick = () => startBattleWithRandomEnemy();
  document.getElementById("backTitleBtn").onclick = () => startTitleScreen();
}

function showDefeat(){
  app.innerHTML = `
    <div class="screen fadeIn">
      <div class="card">
        <div class="cardHeader">
          <div>
            <div class="h1" style="font-size:30px;">Defeat</div>
            <div class="sub">No worries — the journey is about growth.</div>
          </div>
          <div class="topRight">
            <button class="btn" onclick="toggleCollection(true)">My Mehtamon</button>
          </div>
        </div>
        <div class="cardBody">
          <div class="mini">
            <div class="nm">Try Again</div>
            <div class="muted" style="margin-top:8px;">
              You can fight a new enemy or return to the title screen.
            </div>

              <button class="btn btnPrimary" id="retryBtn">Retry Battle</button>
              <button class="btn" id="newEnemyBtn2">New Enemy</button>

        </div>

  `;
  document.getElementById("retryBtn").onclick = () => startBattleWithRandomEnemy();
  document.getElementById("newEnemyBtn2").onclick = () => startBattleWithRandomEnemy();
  document.getElementById("backTitleBtn2").onclick = () => startTitleScreen();
}

function unlockMehtamon(name){
  if (!state.unlocked.has(name)){
    state.unlocked.add(name);
    state.party.push(name);
  }
}

/* =========================================================
   COLLECTION UI
========================================================= */
function toggleCollection(show, previewAll=false){
  if (!show){
    modalBack.classList.remove("show");
    return;
  }
  modalBack.classList.add("show");

  const list = previewAll ? MEHTAMON.slice() : MEHTAMON.filter(m => state.unlocked.has(m.name));
  collectionSub.textContent = previewAll
    ? `Previewing all 50 Mehtamon`
    : `Unlocked ${list.length} / 50`;

  collectionGrid.innerHTML = "";
  list
    .slice()
    .sort((a,b)=> rarityRank(b.rarity)-rarityRank(a.rarity))
    .forEach(m => {
      const owned = state.unlocked.has(m.name);
      const div = document.createElement("div");
      div.className = "mini";
      div.innerHTML = `
        <div class="nameRow">
          <div class="nm">${owned ? escapeHtml(m.name) : "???"}</div>
          <div class="rar">${m.rarity.toUpperCase()}</div>
        </div>
        <div class="muted" style="margin-top:8px; font-size:12px;">
          <b>Signature:</b> ${owned ? escapeHtml(m.signature) : "Locked"}<br>
          <b>Other:</b> ${owned ? escapeHtml(m.moves.slice(1).join(", ")) : "Locked"}
        </div>
        ${owned ? statsHTML(m.base) : `<div class="muted" style="margin-top:10px; font-size:12px;">Defeat this Mehtamon to unlock.</div>`}
      ${owned ? `
  <div style="margin-top:10px;">
    <button class="btn btnGood" data-set="${escapeAttr(m.name)}">
      ${m.name === state.active ? "ACTIVE" : "Set as Active"}
    </button>
  </div>
` : ""}

      `;
      collectionGrid.appendChild(div);
    });
    collectionGrid.querySelectorAll("[data-set]").forEach(btn => {
  btn.onclick = () => {
    const name = btn.getAttribute("data-set");
    state.active = name;
    toggleCollection(false);
collectionGrid.querySelectorAll("[data-set]").forEach(btn => {
  btn.onclick = () => {
    const name = btn.getAttribute("data-set");
    state.active = name;
    toggleCollection(false);

    // 🔧 FORCE UI REFRESH IF WE ARE ON TITLE SCREEN
    if (state.screen === "title") {
      startTitleScreen();
    }
  };
});

  };
});

}

function rarityRank(r){
  return ({Common:1, Rare:2, Elite:3, Legendary:4})[r] || 0;
}

/* =========================================================
   SMALL HELPERS
========================================================= */
function statsHTML(s){
  return `
    <div class="statline">
      <div>HP: <b>${s.hp}</b></div>
      <div>Energy: <b>${s.en}</b></div>
      <div>Speed: <b>${s.spd}</b></div>
      <div>Skill: <b>${s.skl}</b></div>
      <div>IQ: <b>${s.iq}</b></div>
      <div class="muted"> </div>
    </div>
  `;
}

function pushLog(html){
  state.log.push(html);
  if (state.log.length > 40) state.log.shift();
}

function randPick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function pickDistinct(arr, n){
  const copy = arr.slice();
  // shuffle
  for(let i=copy.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [copy[i],copy[j]] = [copy[j],copy[i]];
  }
  return copy.slice(0, Math.min(n, copy.length));
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g,"&quot;");
}
